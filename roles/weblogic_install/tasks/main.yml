---
# ============================================================
# CHECK — Skip if already installed
# ============================================================
- name: Check if WebLogic is already installed
  stat:
    path: "{{ oracle_home }}/wlserver"
  register: wls_home_check

- name: Check if installer already on disk
  stat:
    path: "{{ wls_installer_path }}/{{ wls_installer }}"
  register: installer_on_disk

# ============================================================
# AWS CLI v2 — Install via curl (not dnf)
# ============================================================
- name: Check if AWS CLI is already installed
  shell: aws --version 2>&1
  register: awscli_check
  changed_when: false
  failed_when: false

- name: Download AWS CLI v2 installer
  shell: |
    curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" \
      -o /tmp/awscliv2.zip
  when:
    - not wls_home_check.stat.exists
    - not installer_on_disk.stat.exists
    - awscli_check.rc != 0

- name: Unzip AWS CLI installer
  shell: unzip -q /tmp/awscliv2.zip -d /tmp/awscli-install
  when:
    - not wls_home_check.stat.exists
    - not installer_on_disk.stat.exists
    - awscli_check.rc != 0

- name: Install AWS CLI v2
  shell: /tmp/awscli-install/aws/install
  when:
    - not wls_home_check.stat.exists
    - not installer_on_disk.stat.exists
    - awscli_check.rc != 0

- name: Verify AWS CLI installed
  shell: /usr/local/bin/aws --version
  register: aws_ver
  changed_when: false
  when:
    - not wls_home_check.stat.exists
    - not installer_on_disk.stat.exists

- name: Show AWS CLI version
  debug:
    msg: "{{ aws_ver.stdout | default('AWS CLI already installed') }}"
  when:
    - not wls_home_check.stat.exists
    - not installer_on_disk.stat.exists

# ============================================================
# DOWNLOAD — WebLogic JAR from S3
# ============================================================
- name: Download WebLogic JAR from S3
  shell: |
    /usr/local/bin/aws s3 cp \
      s3://weblogic379063509598/fmw_14.1.2.0.0_wls.jar \
      {{ wls_installer_path }}/{{ wls_installer }} \
      --no-progress
  register: s3_download
  when:
    - not wls_home_check.stat.exists
    - not installer_on_disk.stat.exists
  timeout: 600

- name: Verify installer downloaded successfully
  stat:
    path: "{{ wls_installer_path }}/{{ wls_installer }}"
  register: jar_check

- name: Fail if installer not present
  fail:
    msg: >
      WebLogic JAR not found at {{ wls_installer_path }}/{{ wls_installer }}.
      Check S3 bucket name, key, and IAM role on EC2 instance.
  when: not jar_check.stat.exists

- name: Show installer file size
  debug:
    msg: "Installer size: {{ (jar_check.stat.size / 1024 / 1024) | round(1) }} MB"

- name: Set correct ownership on installer
  file:
    path: "{{ wls_installer_path }}/{{ wls_installer }}"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: "0755"

# ============================================================
# CONFIGURE — oraInst.loc and response file
# ============================================================
- name: Deploy oraInst.loc
  template:
    src: oraInst.loc.j2
    dest: /etc/oraInst.loc
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: "0644"

- name: Deploy silent install response file
  template:
    src: wls_install.rsp.j2
    dest: "{{ wls_installer_path }}/wls_install.rsp"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: "0644"
  when: not wls_home_check.stat.exists

# ============================================================
# INSTALL — Silent install
# ============================================================
- name: Run WebLogic silent installation (10-20 mins)
  become_user: "{{ oracle_user }}"
  shell: |
    export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
    $JAVA_HOME/bin/java -Xmx1024m \
      -jar {{ wls_installer_path }}/{{ wls_installer }} \
      -silent \
      -responseFile {{ wls_installer_path }}/wls_install.rsp \
      -invPtrLoc /etc/oraInst.loc
  register: wls_install_result
  when: not wls_home_check.stat.exists
  timeout: 1800

- name: Show WebLogic install output
  debug:
    var: wls_install_result.stdout_lines
  when:
    - not wls_home_check.stat.exists
    - wls_install_result is defined

- name: Verify wlserver directory created
  stat:
    path: "{{ oracle_home }}/wlserver"
  register: wls_verify

- name: Fail if WebLogic not installed correctly
  fail:
    msg: "WebLogic install failed — {{ oracle_home }}/wlserver not found"
  when: not wls_verify.stat.exists

# ============================================================
# DOMAIN — Create via WLST
# ============================================================
- name: Deploy WLST domain creation script
  template:
    src: create_domain.py.j2
    dest: "{{ wls_installer_path }}/create_domain.py"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: "0755"

- name: Check if domain already exists
  stat:
    path: "{{ wls_domain_home }}/{{ wls_domain_name }}"
  register: domain_exists

- name: Create WebLogic domain via WLST
  become_user: "{{ oracle_user }}"
  shell: |
    export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
    {{ oracle_home }}/oracle_common/common/bin/wlst.sh \
      {{ wls_installer_path }}/create_domain.py
  register: domain_result
  when: not domain_exists.stat.exists
  timeout: 300

- name: Show domain creation output
  debug:
    var: domain_result.stdout_lines
  when:
    - not domain_exists.stat.exists
    - domain_result is defined

# ============================================================
# SERVICE — systemd
# ============================================================
- name: Deploy WebLogic systemd service
  template:
    src: weblogic-admin.service.j2
    dest: /etc/systemd/system/weblogic-admin.service
    mode: "0644"

- name: Reload systemd and start WebLogic
  systemd:
    name: weblogic-admin
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for AdminServer port {{ wls_admin_port }}
  wait_for:
    port: "{{ wls_admin_port }}"
    delay: 20
    timeout: 300

- name: Clean up installer files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ wls_installer_path }}/{{ wls_installer }}"
    - /tmp/awscliv2.zip
    - /tmp/awscli-install
  ignore_errors: true

- name: Print Admin Console URL
  debug:
    msg:
      - "======================================="
      - " WebLogic Installation Complete!"
      - "======================================="
      - " Console : http://{{ ansible_host }}:{{ wls_admin_port }}/console"
      - " User    : {{ wls_admin_user }}"
      - "======================================="