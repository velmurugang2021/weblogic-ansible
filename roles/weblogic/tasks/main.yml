- name: Create oracle group
  group:
    name: "{{ oracle_group }}"
    state: present

- name: Create oracle user
  user:
    name: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    create_home: yes

- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0755'
  loop:
    - "{{ java_home }}"
    - "{{ middleware_home }}"
    - /opt/software

- name: Install required packages
  yum:
    name:
      - unzip
      - libaio
    state: present

- name: Copy JDK (assumes tar.gz already uploaded)
  unarchive:
    src: /opt/software/jdk-11.tar.gz
    dest: "{{ java_home }}"
    remote_src: yes
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"

- name: Set JAVA_HOME
  lineinfile:
    path: /home/{{ oracle_user }}/.bash_profile
    line: 'export JAVA_HOME={{ java_home }}/jdk-11'
    create: yes

- name: Generate silent response file
  template:
    src: silent.rsp.j2
    dest: /home/{{ oracle_user }}/silent.rsp

- name: Run WebLogic installer
  become_user: "{{ oracle_user }}"
  shell: |
    {{ java_home }}/jdk-11/bin/java -jar {{ installer_path }} \
    -silent \
    -responseFile /home/{{ oracle_user }}/silent.rsp \
    -invPtrLoc /home/{{ oracle_user }}/oraInst.loc
  args:
    creates: "{{ middleware_home }}/wlserver"

- name: Create inventory pointer file
  copy:
    dest: /home/{{ oracle_user }}/oraInst.loc
    content: |
      inventory_loc=/home/{{ oracle_user }}/oraInventory
      inst_group={{ oracle_group }}

- name: Set environment variables
  lineinfile:
    path: /home/{{ oracle_user }}/.bash_profile
    line: 'export MW_HOME={{ middleware_home }}'
